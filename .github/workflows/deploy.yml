name: Deploy Web to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: |
          cd client
          npm install --legacy-peer-deps
          npm install react-dom@18.3.1 react-native-web@~0.19.13 react-native-worklets expo-image-picker expo-linking --legacy-peer-deps
      - name: Build Web
        run: |
          cd client
          EXPO_PUBLIC_BASE_URL=/cyclehub npx expo export --platform web
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./client/dist
