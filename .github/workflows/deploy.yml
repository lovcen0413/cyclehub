name: Deploy Web to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies (clean)
        run: |
          rm -rf node_modules client/node_modules package-lock.json client/package-lock.json
          npm install --legacy-peer-deps
          cd client
          npm install react-dom@18.3.1 react-native-web@~0.19.13 react-native-worklets expo-image-picker expo-linking --legacy-peer-deps
      - name: Verify no v6 conflict
        run: |
          npm ls @react-navigation/core 2>/dev/null | grep -q "6\\." && echo "ERROR: v6 detected!" && exit 1 || echo "OK: only v7"
      - name: Build Web
        run: |
          cd client
          npx expo export --platform web
      - name: Fix base path for GitHub Pages
        run: |
          cd client/dist
          sed -i 's|/_expo/|/cyclehub/_expo/|g' index.html
          echo "Fixed paths in index.html"
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./client/dist
