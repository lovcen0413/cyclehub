name: Deploy Web to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies (Expo managed)
        run: |
          cd client
          npx expo install
          npx expo install react-dom react-native-web
      - name: Show installed versions
        run: |
          cd client
          node -e "console.log('screens:', require('react-native-screens/package.json').version)"
          node -e "console.log('nav native:', require('@react-navigation/native/package.json').version)"
          node -e "console.log('nav stack:', require('@react-navigation/native-stack/package.json').version)"
      - name: Build Web
        run: |
          cd client
          npx expo export --platform web
      - name: Fix base path for GitHub Pages
        run: |
          cd client/dist
          sed -i 's|/_expo/|/cyclehub/_expo/|g' index.html
          echo "Fixed paths in index.html"
          grep -o 'src="[^"]*"' index.html
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./client/dist
