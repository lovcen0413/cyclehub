name: Deploy Web to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: |
          cd client
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps
          npm install react-dom@18.3.1 react-native-web@~0.19.13 react-native-worklets expo-image-picker expo-linking --legacy-peer-deps
      - name: Force react-native-screens v3
        run: |
          cd client
          npm install react-native-screens@3.35.0 --legacy-peer-deps --force
          node -e "const v=require('react-native-screens/package.json').version; console.log('screens:',v); process.exit(v.startsWith('3')?0:1)"
      - name: Build Web
        run: |
          cd client
          npx expo export --platform web
      - name: Fix base path for GitHub Pages
        run: |
          cd client/dist
          sed -i 's|/_expo/|/cyclehub/_expo/|g' index.html
          echo "Fixed paths in index.html"
          grep -o 'src="[^"]*"' index.html
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./client/dist
